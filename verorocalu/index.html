<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITI</title>
    <meta name="description" content="A modern platform to help you with your math problems.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>

    <div class="background-elements">
        <div class="blob red-blob"></div>
        <div class="blob white-blob"></div>
        <div class="blob spot-1"></div>
        <div class="blob spot-2"></div>
        <div class="blob spot-3"></div>
    </div>

    <main class="container">
        <header>
            <h1 class="logo">VERORO AI</h1>
        </header>

        <section class="search-section">
            <form class="search-form" id="math-form" aria-label="Math problem form">
                <div class="input-wrapper">
                    <input type="text" id="math-input" class="math-input" placeholder="Type your math problem here..."
                        autocomplete="off">
                    <button type="submit" class="submit-btn" aria-label="Solve">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>
                </div>
                <div id="result-tab" class="result-tab"></div>
                <p class="tagline"><b><i>À vos Calcus!</i></b></p>
            </form>
        </section>

        <div class="gif-frame">
            <img src="jewjewjewjewjewjewjew.gif" class="corner-gif" alt="Decorative GIF">
        </div>
    </main>

    <footer class="footer">
        Proprety of Bertholdt Xiaobing | Version A-0.2.2
    </footer>

    <script src="script.js"></script>
</body>

</html>
